<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HR System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <h2 style="margin-bottom: 1.5rem; color: #1e1b4b;">Welcome Back</h2>
        <p style="margin-bottom: 2rem; color: #4b5563; font-size: 0.9rem;">Sign in to your account</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="admin@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
            <p id="errorMsg" style="color: var(--danger); margin-top: 1rem; font-size: 0.9rem;"></p>
        </form>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');

            submitBtn.disabled = true;
            submitBtn.innerText = 'Signing In...';
            errorMsg.innerText = '';

            try {
                const response = await AuthAPI.login({ email, password });
                localStorage.setItem('token', response.token);
                localStorage.setItem('role', response.role);
                localStorage.setItem('email', response.email);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.innerText = err.message || 'Login failed. Check credentials.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Sign In';
            }
        });
    </script>
</body>
</html>
