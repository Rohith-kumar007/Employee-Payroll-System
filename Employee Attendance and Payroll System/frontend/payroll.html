<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll - HR System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <script src="assets/js/components.js"></script>
    <script>renderSidebar();</script>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2>Payroll Sheets</h2>
                <p style="color: var(--text-secondary);">Review monthly payouts and generate advice note.</p>
            </div>
        </header>

        <!-- Admin Only View -->
        <div id="payrollFormAdmin" style="display: none; background: #ffffff; padding: 1.5rem; border-radius: 12px; box-shadow: var(--shadow); margin-bottom: 2rem;">
            <h4 style="margin-bottom: 1rem;">Generate Payroll</h4>
            <form id="genPayrollForm" style="display: flex; gap: 15px; align-items: flex-end;">
                <div>
                    <label style="font-size: 0.8rem; color: #64748b;">Employee ID</label>
                    <input type="number" id="empId" class="form-control" style="width: 120px;" required>
                </div>
                <div>
                    <label style="font-size: 0.8rem; color: #64748b;">Month</label>
                    <select id="month" class="form-control" required>
                        <option value="JANUARY">JANUARY</option>
                        <option value="FEBRUARY">FEBRUARY</option>
                        <option value="MARCH">MARCH</option>
                        <option value="APRIL">APRIL</option>
                        <!-- Add others if needed -->
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.8rem; color: #64748b;">Year</label>
                    <input type="number" id="year" class="form-control" style="width: 100px;" value="2026" required>
                </div>
                <button type="submit" class="btn-primary" style="width: auto; padding: 0.8rem 1.5rem;">Calculate & Save</button>
            </form>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Employee Name</th><th>Month</th><th>Year</th><th>Worked Days</th><th>Calculated Salary</th>
                    </tr>
                </thead>
                <tbody id="payrollTableBody">
                    <!-- Dynamic rows -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        const role = localStorage.getItem('role');
        const tableBody = document.getElementById('payrollTableBody');
        const formAdmin = document.getElementById('payrollFormAdmin');

        if (role === 'ADMIN') { formAdmin.style.display = 'block'; }

        async function loadPayroll() {
            try {
                let records = [];
                if (role === 'ADMIN') {
                    records = await AdminAPI.getPayrolls();
                } else {
                    records = await EmployeeAPI.getPayroll();
                }

                tableBody.innerHTML = records.map(rec => `
                    <tr>
                        <td>${rec.id}</td>
                        <td>${rec.employeeName}</td>
                        <td>${rec.month}</td>
                        <td>${rec.year}</td>
                        <td>${rec.workedDays}</td>
                        <td><b>$${rec.calculatedSalary.toFixed(2)}</b></td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        document.getElementById('genPayrollForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                employeeId: document.getElementById('empId').value,
                month: document.getElementById('month').value,
                year: parseInt(document.getElementById('year').value)
            };

            try {
                await AdminAPI.generatePayroll(data);
                alert('Payroll generated successfully!');
                loadPayroll();
            } catch (err) { alert(err.message); }
        });

        loadPayroll();
    </script>
</body>
</html>
