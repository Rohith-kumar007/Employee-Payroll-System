<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaves - HR System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 400px; max-width: 90%; }
    </style>
</head>
<body>

    <script src="assets/js/components.js"></script>
    <script>renderSidebar();</script>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2>Leave Management</h2>
                <p style="color: var(--text-secondary);">Request time off or manage approvals.</p>
            </div>
            <button id="applyBtn" class="btn-primary" style="width: auto; padding: 0.8rem 1.5rem; display: none;" onclick="openModal()">+ Apply Leave</button>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Employee</th><th>Start Date</th><th>End Date</th><th>Reason</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leaveTableBody">
                    <!-- Dynamic rows -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Apply Leave Modal (Employee) -->
    <div id="leaveModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 1rem;">Apply for Leave</h3>
            <form id="leaveForm">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <input type="text" id="reason" class="form-control" placeholder="Fever / Personal" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-primary" style="background: var(--text-secondary);" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        const role = localStorage.getItem('role');
        const tableBody = document.getElementById('leaveTableBody');
        const applyBtn = document.getElementById('applyBtn');

        if (role === 'EMPLOYEE') { applyBtn.style.display = 'block'; }

        async function loadLeaves() {
            try {
                let records = [];
                if (role === 'ADMIN') {
                    records = await AdminAPI.getLeaves();
                } else {
                    records = await EmployeeAPI.getLeaves();
                }

                tableBody.innerHTML = records.map(rec => `
                    <tr>
                        <td>${rec.id}</td>
                        <td>${rec.employeeName}</td>
                        <td>${rec.startDate}</td>
                        <td>${rec.endDate}</td>
                        <td>${rec.reason}</td>
                        <td><span class="badge ${rec.status === 'APPROVED' ? 'badge-present' : rec.status === 'REJECTED' ? 'badge-absent' : 'badge-pending'}">${rec.status}</span></td>
                        <td>
                            ${role === 'ADMIN' && rec.status === 'PENDING' ? `
                                <button onclick="updateStatus(${rec.id}, 'APPROVED')" style="border:none; cursor:pointer; color: var(--success);">Approve</button> | 
                                <button onclick="updateStatus(${rec.id}, 'REJECTED')" style="border:none; cursor:pointer; color: var(--danger);">Reject</button>
                            ` : '-'}
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        function openModal() { document.getElementById('leaveModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('leaveModal').style.display = 'none'; }

        document.getElementById('leaveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                reason: document.getElementById('reason').value
            };

            try {
                await EmployeeAPI.applyLeave(data);
                closeModal();
                loadLeaves();
            } catch (err) { alert(err.message); }
        });

        async function updateStatus(id, status) {
            try {
                await AdminAPI.updateLeaveStatus(id, status);
                loadLeaves();
            } catch (err) { alert(err.message); }
        }

        loadLeaves();
    </script>
</body>
</html>
