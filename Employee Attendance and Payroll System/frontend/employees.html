<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees - HR System</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        /* Simple Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; padding: 2rem; border-radius: 12px;
            width: 400px; max-width: 90%;
        }
    </style>
</head>
<body>

    <script src="assets/js/components.js"></script>
    <script>renderSidebar();</script>

    <div class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h2>Employee Management</h2>
                <p style="color: var(--text-secondary);">Add, update, or remove staff members.</p>
            </div>
            <button class="btn-primary" style="width: auto; padding: 0.8rem 1.5rem;" onclick="openModal()">+ Add Employee</button>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Salary</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeeTableBody">
                    <!-- Dynamic rows -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 1rem;" id="modalTitle">Add New Employee</h3>
            <form id="employeeForm">
                <input type="hidden" id="empId">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group" id="passwordGroup">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" class="form-control">
                        <option value="EMPLOYEE">EMPLOYEE</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="department" class="form-control">
                </div>
                <div class="form-group">
                    <label>Base Salary</label>
                    <input type="number" id="baseSalary" class="form-control" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" class="btn-primary" style="background: var(--text-secondary);" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        // Check Admin Role
        if (localStorage.getItem('role') !== 'ADMIN') {
            window.location.href = 'dashboard.html';
        }

        const tableBody = document.getElementById('employeeTableBody');
        const form = document.getElementById('employeeForm');

        async function loadEmployees() {
            try {
                const employees = await AdminAPI.getEmployees();
                tableBody.innerHTML = employees.map(emp => `
                    <tr>
                        <td>${emp.id}</td>
                        <td>${emp.name}</td>
                        <td>${emp.email}</td>
                        <td><span class="badge badge-present">${emp.role}</span></td>
                        <td>${emp.department || '-'}</td>
                        <td>$${emp.baseSalary}</td>
                        <td>
                            <button onclick="editEmployee(${emp.id}, '${emp.name}', '${emp.email}', '${emp.role}', '${emp.department || ''}', ${emp.baseSalary})" style="border:none; background:none; cursor:pointer; color: var(--primary-color);">Edit</button> | 
                            <button onclick="deleteEmployee(${emp.id})" style="border:none; background:none; cursor:pointer; color: var(--danger);">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error(err); }
        }

        function openModal() {
            document.getElementById('employeeModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = 'Add New Employee';
            form.reset();
            document.getElementById('empId').value = '';
            document.getElementById('passwordGroup').style.display = 'block';
            document.getElementById('password').required = true;
        }

        function closeModal() { document.getElementById('employeeModal').style.display = 'none'; }

        function editEmployee(id, name, email, role, department, salary) {
            document.getElementById('employeeModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = 'Edit Employee';
            document.getElementById('empId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('email').value = email;
            document.getElementById('role').value = role;
            document.getElementById('department').value = department;
            document.getElementById('baseSalary').value = salary;
            
            // Hide password field for updates to keep it simple
            document.getElementById('passwordGroup').style.display = 'none';
            document.getElementById('password').required = false;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('empId').value;
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                department: document.getElementById('department').value,
                baseSalary: parseFloat(document.getElementById('baseSalary').value)
            };

            const pwd = document.getElementById('password').value;
            if (pwd) data.password = pwd;

            try {
                if (id) {
                    await AdminAPI.updateEmployee(id, data);
                } else {
                    await AdminAPI.createEmployee(data);
                }
                closeModal();
                loadEmployees();
            } catch (err) { alert(err.message); }
        });

        async function deleteEmployee(id) {
            if (confirm('Are you sure you want to delete this employee?')) {
                try {
                    await AdminAPI.deleteEmployee(id);
                    loadEmployees();
                } catch (err) { alert(err.message); }
            }
        }

        loadEmployees();
    </script>
</body>
</html>
